name: Build firmware release

on:
  push:
    tags:
      - 'firmware/v*'
  # Manual builds of an arbitrary commit, with no release created.
  # The artifacts are attached to the workflow run instead (see the
  # "Upload build artifacts" step).  Use this to flash and validate a
  # work-in-progress commit without minting a release or a tag.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Commit SHA, branch, or tag to build (blank = the branch selected above)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # Empty for tag pushes, so checkout falls back to the
          # triggering ref.  For manual runs this is the commit the
          # operator typed (if any).
          ref: ${{ github.event.inputs.ref }}

      - name: Free disk space
        uses: ./.github/actions/free-disk-space

      - name: Setup
        run: |
          sudo apt update
          sudo apt install -y python3-build python3-can python3-serial python3-setuptools \
              python3-pyelftools python3-qtpy python3-wheel python3-importlib-metadata \
              python3-scipy python3-usb mypy nodejs
          wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo apt install -y ./libtinfo5_6.3-2ubuntu0.1_amd64.deb

      - name: Build firmware
        run: tools/bazel build --config=target -c opt //:target

      - name: Stage release artifacts
        id: stage
        run: |
          # Derive the built commit from the working tree rather than
          # GITHUB_SHA: for a manual run with a "ref" input, GITHUB_SHA
          # is the branch the run was launched from, not the commit we
          # actually checked out.  HEAD is always the built commit.
          sha="$(git rev-parse --short=10 HEAD)"
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
              version="${GITHUB_REF_NAME#firmware/v}"
          else
              # Manual build of an arbitrary commit: there is no version
              # tag, so use a placeholder.  The +g<sha> below still
              # pins the artifact to its exact source commit.
              version="0.0.0-dev"
          fi
          # Filename uses semver build-metadata syntax: <version>+g<sha>.
          # The +g<sha> identifies which commit produced this binary
          # without affecting semver precedence (build metadata is
          # ignored for ordering).
          stamp="${version}+g${sha}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "stamp=${stamp}" >> "$GITHUB_OUTPUT"
          mkdir -p release
          cp bazel-bin/fw/moteus.elf         "release/moteus-fw-${stamp}.elf"
          cp bazel-bin/fw/can_bootloader.elf "release/moteus-bl-${stamp}.elf"
          (cd release && sha256sum * > SHA256SUMS)

      # Manual builds don't create a release; the artifacts are
      # attached to the workflow run instead and can be downloaded
      # from its summary page.
      - name: Upload build artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: moteus-firmware-${{ steps.stage.outputs.stamp }}
          path: release/*

      # Firmware owns the repo's "Latest" badge, but only when the new
      # release is actually the highest version shipped.  A patch on an
      # older minor (1.0.1 cut from release/firmware-1.0.x after 1.1.0
      # has already shipped) must not steal the badge from 1.1.0.
      # Pre-releases never claim it.
      - name: Decide if this release should be marked latest
        id: latest
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          new_ver="${{ steps.stage.outputs.version }}"
          if [[ "$new_ver" == *-* ]]; then
              echo "make_latest=false" >> "$GITHUB_OUTPUT"
              exit 0
          fi
          highest=$(gh release list --limit 1000 \
              --json tagName,isPrerelease,isDraft \
              --jq '.[] | select(.tagName | startswith("firmware/v")) | select(.isPrerelease == false) | select(.isDraft == false) | .tagName' \
              | sed 's|^firmware/v||' \
              | grep -v "^${new_ver}\$" \
              | sort -V | tail -1)
          if [[ -z "$highest" ]] || \
             [[ "$(printf '%s\n%s' "$highest" "$new_ver" | sort -V | tail -1)" == "$new_ver" ]]; then
              echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
              echo "make_latest=false (highest existing is $highest)" >&2
              echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          name: 'firmware v${{ steps.stage.outputs.version }}'
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ steps.latest.outputs.make_latest }}
          # Releases land as drafts so a maintainer can flash and
          # validate the artifacts before they go public.  Publish
          # from the GitHub UI, or from the CLI:
          #   gh release edit firmware/vX.Y.Z --draft=false
          draft: true
          generate_release_notes: true
