name: CI

on: [push, pull_request]


jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4
    - name: setup
      run: |
        sudo apt update
        sudo apt install -y python3-can python3-serial python3-setuptools python3-pyelftools python3-qtpy python3-wheel python3-importlib-metadata python3-scipy python3-usb mypy nodejs
        wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
        sudo apt install -y ./libtinfo5_6.3-2ubuntu0.1_amd64.deb
    - name: test
      run: ./travis-ci.sh

  rust-cross-platform:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-gnu
          - x86_64-unknown-linux-gnu
    steps:
    - uses: actions/checkout@v4
    - name: install libudev-dev
      run: sudo apt-get update && sudo apt-get install -y libudev-dev
    - uses: dtolnay/rust-toolchain@1.82.0
      with:
        targets: ${{ matrix.target }}
    - name: cargo check (${{ matrix.target }})
      working-directory: lib/rust
      run: cargo check --target ${{ matrix.target }} --workspace --all-features
